<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header class="header">
      <div class="header-container">
        <!-- Logo / Marca -->
        <div class="logo">
          <h1>Facturate</h1>
        </div>

        <!-- Navegación -->
        <nav class="nav">
          <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Facturación</a></li>
            <li><a href="#">Inventario</a></li>
            <li><a href="#">Reportes</a></li>
          </ul>
        </nav>

        <!-- Botón de acción -->
        <div class="cta">
          <button>Ingresar</button>
        </div>
      </div>
    </header>

    <style>
      .header {
        background-color: #ffffff;
        border-bottom: 1px solid #e5e5e5;
        padding: 10px 20px;
        font-family: Arial, sans-serif;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .header-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1200px;
        margin: auto;
      }

      /* Logo */
      .logo h1 {
        color: #0b1f3a; /* Azul oscuro */
        font-size: 22px;
        margin: 0;
      }

      /* Navegación */
      .nav ul {
        display: flex;
        list-style: none;
        gap: 20px;
        padding: 0;
        margin: 0;
      }

      .nav a {
        text-decoration: none;
        color: #333;
        font-size: 14px;
        transition: color 0.2s ease;
      }

      .nav a:hover {
        color: #5bc0eb; /* Celeste */
      }

      /* Botón */
      .cta button {
        background-color: #5bc0eb;
        border: none;
        padding: 8px 16px;
        color: #ffffff;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.2s ease;
      }

      .cta button:hover {
        background-color: #3aa6d0;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .nav {
          display: none;
        }
      }
    </style>
  </body>
</html>
